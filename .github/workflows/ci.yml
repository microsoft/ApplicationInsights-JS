# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master, beta, Release2.7, release-3.0, fix/core-deflate-size-limit ]
  pull_request:
    branches: [ main, master, beta, Release2.7, release-3.0 ]
  merge_group:
    branches: [ "main", "master", "beta", "Release*", "release*", "*-legacy", "legacy-v1" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 18, 20, 22, 24 ]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Update rush shrinkwrap dependencies (for different node versions)
      run: node common/scripts/install-run-rush.js update --full --recheck
    - run: npm install rollup -g
    # puppeteer's postinstall downloads Chrome (~184MB) in a single shot with no
    # retry. On the runner that download/extract is unreliable: it creates the
    # version folder, the extract fails, and puppeteer then refuses to re-download
    # over the partial folder ("folder exists but the executable is missing"),
    # aborting `npm install`. Skip the postinstall download here (scoped to the
    # install steps) and install the browser in a dedicated, retrying step below.
    - name: Install grunt-cli (defer puppeteer browser download)
      run: npm install grunt-cli
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'
    - name: Install dependencies (defer puppeteer browser download)
      run: npm install
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'
    # Install only Chrome (qunit launches headless:"new" => full chrome;
    # chrome-headless-shell is never used). Clear the cache before each attempt so a
    # partial/failed extract can't block a clean retry, and retry to ride out the
    # flaky download. Uses the locally-installed puppeteer, so the pinned Chrome
    # version always matches what qunit launches at build/test time.
    - name: Install Chrome for puppeteer (retry + clean partial cache)
      run: |
        for attempt in 1 2 3 4 5; do
          echo "::group::puppeteer install chrome (attempt $attempt)"
          rm -rf ~/.cache/puppeteer
          if npx puppeteer browsers install chrome; then
            npx puppeteer browsers list
            echo "::endgroup::"
            exit 0
          fi
          echo "::endgroup::"
          echo "chrome install attempt $attempt failed; retrying..."
          sleep 5
        done
        echo "chrome install failed after 5 attempts"
        exit 1
    - run: node common/scripts/install-run-rush.js check
    - run: node common/scripts/install-run-rush.js update --full --recheck
    - run: npm run build --verbose
      timeout-minutes: 20
    - run: npm run test --verbose
      timeout-minutes: 30
