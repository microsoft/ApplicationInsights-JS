# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master, beta, Release2.7, release-3.0 ]
  pull_request:
    branches: [ main, master, beta, Release2.7, release-3.0 ]
  merge_group:
    branches: [ "main", "master", "beta", "Release*", "release*", "*-legacy", "legacy-v1" ]

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      # Skip Puppeteer's automatic browser download during the various npm/rush
      # install steps. On the current hosted runner image the auto-download leaves
      # a partial browser folder (download never completes), and a later install
      # then aborts with "the browser folder exists but the executable is missing".
      # We download the browser once, cleanly, in a dedicated step below.
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    strategy:
      matrix:
        node-version: [ 18, 20, 22, 24 ]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Use a clean Puppeteer browser cache
      # Point Puppeteer at a clean per-job cache directory (the default
      # ~/.cache/puppeteer on the runner image is pre-seeded with a partial entry).
      run: echo "PUPPETEER_CACHE_DIR=${RUNNER_TEMP}/puppeteer" >> "$GITHUB_ENV"
    - name: Update rush shrinkwrap dependencies (for different node versions)
      run: node common/scripts/install-run-rush.js update --full --recheck
    - run: npm install rollup -g
    - run: npm install grunt-cli
    - run: npm install
    - name: Install Puppeteer browser
      # `browsers install` always downloads (it ignores PUPPETEER_SKIP_DOWNLOAD),
      # so this performs a single clean download into the empty cache dir. The
      # tests launch this bundled browser.
      run: |
        npx puppeteer browsers install chrome
        npx puppeteer browsers install chrome-headless-shell
    - run: node common/scripts/install-run-rush.js check
    - run: node common/scripts/install-run-rush.js update --full --recheck
    - run: npm run build --verbose
      timeout-minutes: 20
    - run: npm run test --verbose
      timeout-minutes: 30
