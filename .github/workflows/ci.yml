# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master, beta, Release2.7, release-3.0 ]
  pull_request:
    branches: [ main, master, beta, Release2.7, release-3.0 ]
  merge_group:
    branches: [ "main", "master", "beta", "Release*", "release*", "*-legacy", "legacy-v1" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 18, 20, 22, 24 ]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Update rush shrinkwrap dependencies (for different node versions)
      run: node common/scripts/install-run-rush.js update --full --recheck
    - run: npm install rollup -g
    # Puppeteer's postinstall downloads Chrome+chrome-headless-shell in parallel and
    # the extract intermittently corrupts on GitHub runners ("browser folder exists
    # but the executable is missing"), which aborts npm install. This is flaky (main
    # alternates pass/fail with the same stock flow), so defer the download here and
    # do it in a dedicated retry-with-clean step below.
    - name: Install grunt-cli (defer flaky puppeteer browser download)
      run: npm install grunt-cli
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'
    - name: Install dependencies (defer flaky puppeteer browser download)
      run: npm install
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'
    - run: node common/scripts/install-run-rush.js check
    - run: node common/scripts/install-run-rush.js update --full --recheck
    # Puppeteer's own installer downloads intermittently corrupt/no-op on GitHub
    # runners (main alternates pass/fail with the stock flow). Bypass it: fetch the
    # exact pinned Chrome-for-Testing build directly with curl --retry into the cache
    # dir puppeteer probes, then verify by actually launching it. All tests use the
    # full chrome binary via headless:'new'; chrome-headless-shell is unused.
    - name: Install Chrome for puppeteer (direct download, retry + verify)
      run: |
        PV=$(node -e "process.stdout.write(require('puppeteer').PUPPETEER_REVISIONS.chrome)")
        echo "Pinned Chrome version: $PV"
        DEST="$HOME/.cache/puppeteer/chrome/linux-$PV"
        URL="https://storage.googleapis.com/chrome-for-testing-public/$PV/linux64/chrome-linux64.zip"
        for attempt in 1 2 3 4 5; do
          echo "=== Chrome download attempt $attempt ==="
          rm -rf "$DEST"
          mkdir -p "$DEST"
          if curl --retry 5 --retry-all-errors --retry-delay 5 -fSL -o /tmp/chrome.zip "$URL" \
            && unzip -q -o /tmp/chrome.zip -d "$DEST" \
            && chmod +x "$DEST/chrome-linux64/chrome" \
            && node -e "require('puppeteer').launch({headless:'new',args:['--no-sandbox']}).then(function(b){return b.close();}).then(function(){process.exit(0);}).catch(function(e){console.error(e);process.exit(1);});"; then
            echo "Chrome downloaded and verified at $DEST/chrome-linux64/chrome"
            exit 0
          fi
          echo "Attempt $attempt failed; cleaning and retrying"
        done
        echo "All Chrome download attempts failed"
        exit 1
    - run: npm run build --verbose
      timeout-minutes: 20
    - run: npm run test --verbose
      timeout-minutes: 30
