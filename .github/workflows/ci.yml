# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master, beta, Release2.7, release-3.0 ]
  pull_request:
    branches: [ main, master, beta, Release2.7, release-3.0 ]
  merge_group:
    branches: [ "main", "master", "beta", "Release*", "release*", "*-legacy", "legacy-v1" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 18, 20, 22, 24 ]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Update rush shrinkwrap dependencies (for different node versions)
      run: node common/scripts/install-run-rush.js update --full --recheck
    - run: npm install rollup -g
    # Installing grunt-cli pulls in puppeteer, whose postinstall downloads Chrome.
    # That download is flaky and has no retry, so a single partial download fails
    # the whole job ("The browser folder exists but the executable is missing").
    # Gate the auto-download here (PUPPETEER_SKIP_DOWNLOAD scoped to THIS step only)
    # so grunt-cli installs reliably, then download the browsers explicitly below
    # with a retry. Note: a plain 'npm install' retry does NOT re-download Chrome,
    # because once node_modules/puppeteer exists npm skips its postinstall script -
    # so the cache stays empty and the 'grunt shims' build (qunit:shims) can't find
    # Chrome. Downloading via 'puppeteer browsers install' actually re-fetches it.
    - name: Install grunt-cli (defer puppeteer browser download)
      run: npm install grunt-cli
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'
    - name: Install puppeteer browsers (retry to recover from partial downloads)
      run: |
        install_browsers() {
          npx puppeteer browsers install chrome \
            && npx puppeteer browsers install chrome-headless-shell
        }
        for attempt in 1 2 3; do
          echo "::group::puppeteer browsers install (attempt $attempt)"
          if install_browsers; then
            npx puppeteer browsers list
            echo "::endgroup::"
            break
          fi
          echo "::endgroup::"
          if [ "$attempt" = "3" ]; then
            echo "Failed to install puppeteer browsers after $attempt attempts"
            exit 1
          fi
          echo "Partial/corrupt download detected; clearing puppeteer cache and retrying..."
          rm -rf ~/.cache/puppeteer
        done
    # Browsers are now cached, so puppeteer's postinstall here is a no-op (it finds
    # Chrome present and skips the download), avoiding another flaky fetch.
    - run: npm install
    - run: node common/scripts/install-run-rush.js check
    - run: node common/scripts/install-run-rush.js update --full --recheck
    - run: npm run build --verbose
      timeout-minutes: 20
    - run: npm run test --verbose
      timeout-minutes: 30
