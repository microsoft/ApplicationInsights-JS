# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master, beta, Release2.7, release-3.0 ]
  pull_request:
    branches: [ main, master, beta, Release2.7, release-3.0 ]
  merge_group:
    branches: [ "main", "master", "beta", "Release*", "release*", "*-legacy", "legacy-v1" ]

jobs:
  build:

    runs-on: ubuntu-latest

    # Gate puppeteer's flaky postinstall browser download. Without this the
    # `npm install` steps fail when the puppeteer cache is partial (the browser
    # folder exists but the executable is missing). Browsers are installed
    # explicitly below before the tests run.
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    strategy:
      matrix:
        node-version: [ 18, 20, 22, 24 ]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Update rush shrinkwrap dependencies (for different node versions)
      run: node common/scripts/install-run-rush.js update --full --recheck
    - run: npm install rollup -g
    - run: npm install grunt-cli
    - run: npm install
    - run: node common/scripts/install-run-rush.js check
    - run: node common/scripts/install-run-rush.js update --full --recheck
    # Install browsers explicitly (by name) so they download even though
    # PUPPETEER_SKIP_DOWNLOAD is set. The no-arg form is a silent no-op when
    # that env var is set, so each browser must be named.
    - name: Install Puppeteer browsers
      run: |
        npx puppeteer browsers install chrome
        npx puppeteer browsers install chrome-headless-shell
        npx puppeteer browsers list
    - run: npm run build --verbose
      timeout-minutes: 20
    - run: npm run test --verbose
      timeout-minutes: 30
